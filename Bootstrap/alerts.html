<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="alert alert-success" role="alert">
        This is a success alert!
    </div>
    <span class="badge bg-primary">New</span>
    <span class="badge bg-danger">Don't Touch</span>
    <form action="">
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">@</span>
            <input type="text" class="form-control" placeholder="Enter Your mail ID">
            <button class="btn btn-primary" type="button">Submit</button>
        </div>
        <div class="mb-3">
            <label for="formFile" class="form-label">Default file input example</label>
            <input class="form-control" type="file" id="formFile">
        </div>
    </form>
    <div class="container ">
    <form action="" style="width: 50%;">
        <div class="mb-3">
            <div class="input-group mb-3">
                <label for="" class="input-group-text">Enter Username</label>
                <input type="text" class="form-control"  placeholder="Enter Your mail ID">
            </div>
            <div class="input-group mb-3">
                <label for="" class="input-group-text">Enter Password</label>
                <input type="text" class="form-control" placeholder="Enter Your Password">
            </div>
            <button class="btn btn-primary" style="margin-left: 40%;">Submit</button>
        </div>
    </form>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">Open Model</button>
    <div class="modal fade" id="exampleModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modal title</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Modal body text goes here.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


    <div class="container bg-light">
        <form action="">
            <div class="mb-3">
                <label for="" class="form-label">Enter Your Name</label>
                <input type="text" class="form-control" placeholder="Enter Your Name">
            </div>
            <div class="mb-3">
                <label for="" class="form-label">Enter Your Email</label>
                <input type="email" class="form-control" placeholder="Enter Your Email">
            </div>
            <div class="mb-3">
                <label for="" class="form-label">Enter Your Password</label>
                <input type="password" class="form-control" placeholder="Enter Your Password">
            </div>
            <div class="mb-3">
                <input type="checkbox" name="" id="" class="form-check-input">
                <label for="" class="form-check-label">Agree to the <a href="" class="btn btn-link" data-bs-toggle="modal" data-bs-target="#TermsAndConditions">Terms and Conditions</a></label>
            </div>
            <div class="modal fade" id="TermsAndConditions">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Terms and Conditions</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p>If you agree to terms and condition we might use the image of your pet for advertisement purpose</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary">Save changes</button>
                        </div>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary">Submit</button>
        </form>
    </div>

</html>
