<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .calculator {
            background: #2c3e50;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 340px;
        }

        .display {
            background: #34495e;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 3rem;
            text-align: right;
            padding: 20px;
            margin-bottom: 20px;
            font-weight: 300;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-calc {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: 500;
            border: none;
            margin: 5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-calc:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-calc:active {
            transform: scale(0.95);
        }

        .btn-number {
            background: #546e7a;
            color: white;
        }

        .btn-number:hover {
            background: #607d8b;
            color: white;
        }

        .btn-operator {
            background: #ff9500;
            color: white;
        }

        .btn-operator:hover {
            background: #ffaa33;
            color: white;
        }

        .btn-function {
            background: #455a64;
            color: white;
        }

        .btn-function:hover {
            background: #546e7a;
            color: white;
        }

        .btn-zero {
            width: 150px !important;
            border-radius: 35px !important;
        }

        .button-row {
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="form-control display" id="display" value="0">
        
        <div class="button-row">
            <button class="btn btn-calc btn-function" onclick="clearDisplay()">Del</button>
            <button class="btn btn-calc btn-function" onclick="toggleSign()">AC</button>
            <button class="btn btn-calc btn-function" onclick="inputPercent()">%</button>
            <button class="btn btn-calc btn-operator" onclick="inputOperator('/')">÷</button>
        </div>

        <div class="button-row">
            <button class="btn btn-calc btn-number" onclick="inputNumber('7')">7</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('8')">8</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('9')">9</button>
            <button class="btn btn-calc btn-operator" onclick="inputOperator('*')">×</button>
        </div>
        <div class="button-row">
            <button class="btn btn-calc btn-number" onclick="inputNumber('4')">4</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('5')">5</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('6')">6</button>
            <button class="btn btn-calc btn-operator" onclick="inputOperator('-')">−</button>
        </div>

        <div class="button-row">
            <button class="btn btn-calc btn-number" onclick="inputNumber('1')">1</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('2')">2</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('3')">3</button>
            <button class="btn btn-calc btn-operator" onclick="inputOperator('+')">+</button>
        </div>

        <div class="button-row">
            <button class="btn btn-calc btn-function" onclick="inputPlusMinus()">+/−</button>
            <button class="btn btn-calc btn-number" onclick="inputNumber('0')">0</button>
            <button class="btn btn-calc btn-number" onclick="inputDecimal()">.</button>
            <button class="btn btn-calc btn-operator" onclick="calculate()">=</button>
        </div>
    </div>
</body>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username');
    const password = urlParams.get('password');
    console.log(username, password);
</script>
</html>
