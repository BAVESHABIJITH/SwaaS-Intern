<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reg. Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .form-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .ownerDetails, .petDetails {
            padding: 20px;
            border-radius: 8px;
        }

        .ownerDetails h2, .petDetails h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 15px 10px;
            align-items: center;
        }

        .form-grid label {
            text-align: right;
            padding-right: 10px;
        }

        .form-grid input[type="text"],
        .form-grid input[type="email"],
        .form-grid input[type="tel"],
        .form-grid input[type="password"],
        .form-grid select,
        .form-grid textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .form-grid textarea {
            height: 80px;
            resize: vertical;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .submit-container {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        button[type="submit"] {
            padding: 10px 30px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        @media (max-width: 768px) {
            .form-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <form action="./LandingPage.html">
        <h1>Registration Form</h1>
        <div class="form-container">
            <div class="ownerDetails">
                <h2>Enter Owner Details below</h2>
                <div class="form-grid">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">

                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">

                    <label for="address">Address:</label>
                    <textarea name="address" id="address" placeholder="Enter your address"></textarea>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password">
                </div>
            </div>

            <div class="petDetails">
                <h2>Enter Pet Details below</h2>
                <div class="form-grid">
                    <label for="petName">Pet Name:</label>
                    <input type="text" id="petName" name="petName" placeholder="Enter your pet name">

                    <label for="petType">Pet Type:</label>
                    <select name="petType" id="petType" onchange="setBreed()">
                        <option value="">Select a pet type</option>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                        <option value="Bird">Bird</option>
                    </select>

                    <label for="gender">Gender:</label>
                    <div class="input-group">
                        <input type="radio" name="gender" id="genderMale" value="male">
                        <label for="genderMale">Male</label>
                        <input type="radio" name="gender" id="genderFemale" value="female">
                        <label for="genderFemale">Female</label>
                    </div>

                    <label for="breed">Breed:</label>
                    <select name="breed" id="breed">
                        <option value="">Select pet type first</option>
                    </select>

                    <label for="allergies">Allergies:</label>
                    <textarea name="allergies" id="allergies" placeholder="Enter your allergies"></textarea>

                    <label for="vaccination">Vaccination:</label>
                    <div class="input-group">
                        <input type="checkbox" name="rabies" id="rabies">
                        <label for="rabies">Rabies</label>
                        <input type="checkbox" name="distemper" id="distemper">
                        <label for="distemper">Distemper</label>
                        <input type="checkbox" name="parvovirus" id="parvovirus">
                        <label for="parvovirus">Parvovirus</label>
                        <input type="checkbox" name="hepatitis" id="hepatitis">
                        <label for="hepatitis">Hepatitis</label>
                    </div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit" onclick="saveUser()">Submit</button>
            </div>
        </div>
    </form>
</body>
<script>
const breedData = {
    "Dog": ["Labrador", "German Shepherd", "Golden Retriever", "Bulldog", "Beagle", "Poodle", "Rottweiler", "Dachshund"],
    "Cat": ["Persian", "Siamese", "Maine Coon", "Bengal", "British Shorthair", "Sphynx", "Ragdoll", "Scottish Fold"],
    "Bird": ["Parrot", "Canary", "Cockatiel", "Budgerigar", "Lovebird", "Macaw", "African Grey", "Finch"]
};

function setBreed() {
    const selectedPetType = document.getElementById("petType").value;
    const breedDropdown = document.getElementById("breed");
    breedDropdown.innerHTML = "";
    if (selectedPetType === "") {
        breedDropdown.innerHTML = '<option value="">Select pet type first</option>';
        return;
    }
    breedDropdown.innerHTML = '<option value="">Select a breed</option>';
    const breeds = breedData[selectedPetType];
    for (let i = 0; i < breeds.length; i++) {
        const breedName = breeds[i];
        breedDropdown.innerHTML += '<option value="' + breedName + '">' + breedName + '</option>';
    }
}

function saveUser() {
    let userDetails = {};
    const fullName = document.getElementById("fullName").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const password = document.getElementById("password").value;
    const petName = document.getElementById("petName").value;
    const petType = document.getElementById("petType").value;
    const gender = document.getElementById("gender").value;
    const breed = document.getElementById("breed").value;
    const allergies = document.getElementById("allergies").value;
    const vaccination = document.getElementById("vaccination").value;
    userDetails.fullName = fullName;
    userDetails.email = email;
    userDetails.phone = phone;
    userDetails.address = address;
    userDetails.password = password;
    userDetails.petName = petName;
    userDetails.petType = petType;
    userDetails.gender = gender;
    userDetails.breed = breed;
    userDetails.allergies = allergies;
    userDetails.vaccination = vaccination;
    console.log(userDetails);
}
</script>
</html>
