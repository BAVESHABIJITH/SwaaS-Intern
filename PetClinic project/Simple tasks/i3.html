<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div>p:first-child{
            color: red;
        }
        div>p:last-child{
            color: green;
        }

    <div>
        <p>1st child</p>
        <p>last child</p>
    </div>
